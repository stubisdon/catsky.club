name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Deploy to production server
        uses: appleboy/ssh-action@master
        env:
          GIT_PAT: ${{ secrets.GIT_PAT }}
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          envs: GIT_PAT
          script: |
            #!/bin/bash
            set -e
            cd /opt/catsky-club
            
            export GIT_TERMINAL_PROMPT=0
            REMOTE_URL=$(git remote get-url origin)
            
            if [ -n "$GIT_PAT" ]; then
              echo "Using GIT_PAT (length=${#GIT_PAT}) for git pull."
              # URL-encode PAT so special chars don't break the git URL (use Python from env to avoid PAT in argv)
              if command -v python3 >/dev/null 2>&1; then
                GIT_PAT_SAFE=$(python3 -c "import urllib.parse, os; print(urllib.parse.quote(os.environ.get('GIT_PAT', ''), safe=''))")
              else
                urlencode() {
                  local LC_ALL=C length="${#1}" i c
                  for (( i = 0; i < length; i++ )); do
                    c="${1:$i:1}"
                    case "$c" in [a-zA-Z0-9.~_-]) printf '%s' "$c" ;; *) printf '%%%02X' "'$c" ;; esac
                  done
                }
                GIT_PAT_SAFE=$(urlencode "$GIT_PAT")
              fi
              # Build an explicit authenticated GitHub URL so stale server-side git config cannot interfere.
              REPO_PATH=$(printf "%s" "$REMOTE_URL" | sed -E 's#^git@github\.com:##; s#^https://([^@/]+@)?github\.com/##; s#\.git$##')
              if [ -z "$REPO_PATH" ] || [ "$REPO_PATH" = "$REMOTE_URL" ]; then
                echo "ERROR: Could not parse origin remote URL: $REMOTE_URL"
                exit 1
              fi
              AUTH_REMOTE_URL="https://x-access-token:${GIT_PAT_SAFE}@github.com/${REPO_PATH}.git"
              git pull "$AUTH_REMOTE_URL" main
            elif [[ "$REMOTE_URL" == git@* ]]; then
              git pull origin main
            else
              echo "ERROR: Cannot authenticate git pull."
              echo "GIT_PAT is unset or empty on server (check Actions secret GIT_PAT and envs pass-through)."
              echo "For private repos, either:"
              echo "  1. Add GIT_PAT secret with a Personal Access Token (repo scope)"
              echo "  2. Configure SSH deploy key on production server"
              exit 1
            fi
            
            chmod +x deploy.sh
            ./deploy.sh
          timeout: 10m
