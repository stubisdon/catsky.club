name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Deploy to production server
        uses: appleboy/ssh-action@master
        env:
          GIT_PAT: ${{ secrets.GIT_PAT }}
          GIT_PAT_2: ${{ secrets.GIT_PAT_2 }}
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          envs: GIT_PAT,GIT_PAT_2
          script: |
            #!/bin/bash
            set -e
            cd /opt/catsky-club
            
            export GIT_TERMINAL_PROMPT=0
            REMOTE_URL=$(git remote get-url origin)
            
            AUTH_PAT="${GIT_PAT_2:-$GIT_PAT}"

            # If the server has local modifications (often from a previous `npm install`),
            # Git pull can fail with:
            # "Your local changes to the following files would be overwritten by merge: package-lock.json"
            # Stash package-lock.json temporarily so the pull can proceed cleanly.
            LOCK_STASHED=0
            if ! git diff --quiet -- package-lock.json || ! git diff --cached --quiet -- package-lock.json; then
              echo "Detected local package-lock.json changes; stashing before git pull..."
              git stash push -m "ci: stash package-lock.json before pull" -- package-lock.json
              LOCK_STASHED=1
            fi

            if [ -n "$AUTH_PAT" ]; then
              if [ -n "$GIT_PAT_2" ]; then
                echo "Using GIT_PAT_2 (length=${#GIT_PAT_2}) for git pull."
              else
                echo "Using GIT_PAT (length=${#GIT_PAT}) for git pull."
              fi
              # URL-encode PAT so special chars don't break the git URL (use Python from env to avoid PAT in argv)
              if command -v python3 >/dev/null 2>&1; then
                GIT_PAT_SAFE=$(AUTH_PAT="$AUTH_PAT" python3 -c "import urllib.parse, os; print(urllib.parse.quote(os.environ.get('AUTH_PAT', ''), safe=''))")
              else
                urlencode() {
                  local LC_ALL=C length="${#1}" i c
                  for (( i = 0; i < length; i++ )); do
                    c="${1:$i:1}"
                    case "$c" in [a-zA-Z0-9.~_-]) printf '%s' "$c" ;; *) printf '%%%02X' "'$c" ;; esac
                  done
                }
                GIT_PAT_SAFE=$(urlencode "$AUTH_PAT")
              fi
              # Build an explicit authenticated GitHub URL so stale server-side git config cannot interfere.
              REPO_PATH=$(printf "%s" "$REMOTE_URL" | sed -E 's#^git@github\.com:##; s#^https://([^@/]+@)?github\.com/##; s#\.git$##')
              if [ -z "$REPO_PATH" ] || [ "$REPO_PATH" = "$REMOTE_URL" ]; then
                echo "ERROR: Could not parse origin remote URL: $REMOTE_URL"
                exit 1
              fi
              AUTH_REMOTE_URL="https://x-access-token:${GIT_PAT_SAFE}@github.com/${REPO_PATH}.git"
              git pull "$AUTH_REMOTE_URL" main
            elif [[ "$REMOTE_URL" == git@* ]]; then
              git pull origin main
            else
              echo "ERROR: Cannot authenticate git pull."
              echo "No PAT found. Set GIT_PAT_2 (preferred) or GIT_PAT in GitHub Actions secrets."
              echo "For private repos, either:"
              echo "  1. Add GIT_PAT_2 (or GIT_PAT) secret with a Personal Access Token (repo scope)"
              echo "  2. Configure SSH deploy key on production server"
              exit 1
            fi

            # We don't need the stashed lockfile changes after pulling; drop them so
            # the working tree reflects the pulled state.
            if [ "$LOCK_STASHED" = "1" ]; then
              git stash drop --quiet stash@{0} || true
            fi
            
            chmod +x deploy.sh
            ./deploy.sh
          timeout: 10m
