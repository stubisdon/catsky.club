name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Deploy to production server
        uses: appleboy/ssh-action@master
        env:
          GIT_PAT: ${{ secrets.GIT_PAT }}
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          envs: GIT_PAT
          script: |
            set -e
            cd /opt/catsky-club
            
            # Prevent git from prompting for credentials (non-interactive)
            export GIT_TERMINAL_PROMPT=0
            
            # URL-encode PAT so special chars (@ # % etc.) don't break the git URL
            urlencode() {
              local LC_ALL=C
              local length="${#1}"
              for (( i = 0; i < length; i++ )); do
                local c="${1:$i:1}"
                case "$c" in
                  [a-zA-Z0-9.~_-]) printf '%s' "$c" ;;
                  *) printf '%%%02X' "'$c" ;;
                esac
              done
            }
            
            # Configure git authentication for private repository
            REMOTE_URL=$(git remote get-url origin)
            
            if [ -n "$GIT_PAT" ]; then
              echo "Using GIT_PAT (length=${#GIT_PAT}) for git pull."
              GIT_PAT_SAFE=$(urlencode "$GIT_PAT")
              git config --global credential.helper ""
              git config --global url."https://${GIT_PAT_SAFE}@github.com/".insteadOf "https://github.com/"
              git pull origin main
            elif [[ "$REMOTE_URL" == git@* ]]; then
              git pull origin main
            else
              echo "ERROR: Cannot authenticate git pull."
              echo "GIT_PAT is unset or empty on server (check Actions secret GIT_PAT and envs pass-through)."
              echo "For private repos, either:"
              echo "  1. Add GIT_PAT secret with a Personal Access Token (repo scope)"
              echo "  2. Configure SSH deploy key on production server"
              exit 1
            fi
            
            chmod +x deploy.sh
            ./deploy.sh
          timeout: 10m
