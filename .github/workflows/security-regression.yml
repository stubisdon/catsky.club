# Regression checks for the 2026-05-23 security review findings
# (plans/2026-05-23-security-review-remediation.md). Separate from the general
# `test.yml` (currently disabled) because these guard specific, previously-found
# vulnerabilities and must not be turned off along with the rest of the suite.
name: Security regression

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  security-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run security regression tests
        run: npm run test:security
