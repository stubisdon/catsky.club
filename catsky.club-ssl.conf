server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    # Replace catsky.club throughout this file with your own domain name.
    server_name catsky.club;
    root /var/www/catsky.club/system/nginx-root; # Used for acme.sh SSL verification (https://acme.sh)

    # Replace catsky.club in these paths with your domain (matches acme.sh cert directory structure)
    ssl_certificate /etc/letsencrypt/catsky.club/fullchain.cer;
    ssl_certificate_key /etc/letsencrypt/catsky.club/catsky.club.key;
    include /etc/nginx/snippets/ssl-params.conf;

    # =============================================================
    # SECURITY HEADERS
    # =============================================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # =============================================================
    # CVE-2026-26980 MITIGATION - Ghost SQL Injection WAF Rule
    # Remove this block after upgrading Ghost to 6.19.1+
    # =============================================================
    # Block SQL injection attempts targeting Ghost Content API slug filter
    location ~* "slug(%3A|:)(%5B|\[)" {
        return 403;
    }

    # Ghost Portal script (must come before root location)
    location = /portal.min.js {
        proxy_pass http://127.0.0.1:2368/portal.min.js;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept application/javascript;
    }

    # Frontend React App (served by Express on port 3001)
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Increase timeouts for long-running requests
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # API endpoints (for frontend API)
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Ghost Admin Panel
    location /ghost/ {
        proxy_pass http://127.0.0.1:2368/ghost/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_redirect http://127.0.0.1:2368/ https://$host/;
        proxy_redirect http://localhost:2368/ https://$host/;
        proxy_redirect http://localhost/ https://$host/;
    }

    # Ghost Content API
    location /ghost/api/ {
        proxy_pass http://127.0.0.1:2368/ghost/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_redirect http://127.0.0.1:2368/ https://$host/;
        proxy_redirect http://localhost:2368/ https://$host/;
        proxy_redirect http://localhost/ https://$host/;
    }

    # Ghost content images (used by Ghost Admin + email assets)
    location /content/images/ {
        proxy_pass http://127.0.0.1:2368/content/images/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_redirect http://127.0.0.1:2368/ https://$host/;
        proxy_redirect http://localhost:2368/ https://$host/;
        proxy_redirect http://localhost/ https://$host/;
    }

    # Ghost email click/open tracking redirects
    location /r/ {
        proxy_pass http://127.0.0.1:2368/r/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_redirect http://127.0.0.1:2368/ https://$host/;
        proxy_redirect http://localhost:2368/ https://$host/;
        proxy_redirect http://localhost/ https://$host/;
    }

    # Ghost Members (subscriptions, sign-in, etc.)
    location /members/ {
        proxy_pass http://127.0.0.1:2368/members/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Ghost newsletter unsubscribe links
    # Example: /unsubscribe/?uuid=<...>&key=<...>&newsletter=<...>
    location = /unsubscribe {
        proxy_pass http://127.0.0.1:2368/unsubscribe/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_redirect http://127.0.0.1:2368/ https://$host/;
        proxy_redirect http://localhost:2368/ https://$host/;
        proxy_redirect http://localhost/ https://$host/;
    }

    location /unsubscribe/ {
        proxy_pass http://127.0.0.1:2368/unsubscribe/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_redirect http://127.0.0.1:2368/ https://$host/;
        proxy_redirect http://localhost:2368/ https://$host/;
        proxy_redirect http://localhost/ https://$host/;
    }

    # Ghost Webhooks
    location /webhooks/ {
        proxy_pass http://127.0.0.1:2368/webhooks/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ /.well-known {
        allow all;
    }

    client_max_body_size 50m;
}
